gold_reasoning: |
  **Gold: `NPSv18.9`** — computed Ile107 preference 276.7× in the tightened 5-compound panel.

  ## Derivation

  Gold is the geometric mean of `hNPSR1-Asn107 EC50` divided by the geometric mean of `hNPSR1-Ile107 EC50`, aggregated across replicates per (compound, receptor) in `data/processed/invitro_assays.csv`. Validator: `data/validators/cb-nps-polymorphism-001.py`.

  ## The 5-compound panel

  | compound | Asn107 EC50 (nM) | Ile107 EC50 (nM) | preference | role |
  |---|---:|---:|---:|---|
  | **NPSv18.9** | 260.8 | 0.94 | **277×** | gold (long extended K11 lipidation) |
  | NPSv5.4 | 52.3 | 0.89 | 59× | trap (D-aa scatter + standard palmitoyl) |
  | NPS (native) | 25.8 | 3.8 | 6.8× | baseline (Reinscheid 2002) |
  | NPSv18.16 | n/a | n/a | < 1 | sibling control (same K11 site, shorter palmitoyl, prefers Asn107) |
  | NPSv8 | — | — | inactive | all-D retro decoy |

  ## Why NPSv18.9 wins

  `NPSv18.9` is native human NPS with an unusually heavy lipidation linker at K11: gamma-Glu + two AEEA spacers + a C20 diacid (~30-atom extended arm). The Asn107→Ile107 substitution swaps a polar amide for a bulky hydrophobic side chain in the K11 contact region of the receptor. A long hydrophobic arm reaching that pocket:
    - clashes with Asn107 (polar–hydrophobic mismatch) → high EC50;
    - matches Ile107 (lipophilic–lipophilic) → low EC50.

  `NPSv5.4` is the trap: four visible modifications (D-Ser, D-Lys, D-Thr, palmitoyl-at-K11) look "comprehensively optimized," but the standard ~16-atom palmitoyl chain doesn't reach far enough into the binding pocket to make differential contact at position 107. `NPSv18.16` is the key sibling control — same K11 lipidation site as the gold, same general modification class, but the shorter C16 palmitoyl chain actually prefers Asn107 (wrong direction). That contrast tells you chain length and arm geometry — not modification count — drive the variant selectivity.

  Random-guess baseline: 1/5 = 20%.

  ## Panel history

  Tightened on 2026-05-13 from an original 14-compound panel. The removed candidates (hNPS(1-10), rNPS(1-10), and six other internal modifications) ranged 44× to 111× — close enough to the gold that confident reasoning could land on them by mistake. The current panel removes that ambiguity to test mechanism recognition.
