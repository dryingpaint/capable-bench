benchmark:
  name: capable-bench
  version: 0.1.0
  description: >
    Agentic benchmark for biological and biochemical reasoning, hypothesis
    generation, experiment planning, translational candidate decisions, and
    end-to-end drug discovery over private scientific datasets. Tasks are
    method-agnostic: agents may inspect files, write code, and run arbitrary
    analyses, but are graded on final answers.

paths:
  processed_dir: data/processed
  tasks_dir: data/tasks
  answers_dir: data/answers
  runs_dir: runs

task_defaults:
  allowed_domains: []
  require_answer_file: answer.json
  max_runtime_seconds: 1800
  scoring_modes:
    - ranking
    - label
    - option_ranking
    - multi_field_exact_match

calibration:
  target_max_mean_score: 0.60
  compare_agents:
    - codex
    - claude
  report_by_task_family: true

capability_targets:
  - mechanistic_reasoning
  - hypothesis_generation
  - experiment_planning
  - translational_decision_making
  - model_augmented_discovery

task_types:
  ranking:
    - candidate_prioritization
  label:
    - hit_prediction
  option_ranking:
    - next_experiment
  multi_field_exact_match:
    - multitarget_activity
    - program_lead_selection

evidence_layers:
  - identity
  - in_vitro
  - developability
  - in_vivo
  - omics
  - structure
  - model_outputs
  - decision_history

pilot_generation:
  min_candidates_per_task: 6
  max_candidates_per_task: 12
  top_k: 3
  random_seed: 20260511
  target_task_mix:
    candidate_prioritization: 10
    hit_prediction: 5
    next_experiment: 5
    multitarget_activity: 5
    program_lead_selection: 2
